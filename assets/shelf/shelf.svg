<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D2A06D"/>
      <stop offset="50%" stop-color="#B8864E"/>
      <stop offset="100%" stop-color="#9E6B33"/>
    </linearGradient>
    <linearGradient id="woodDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0764A"/>
      <stop offset="100%" stop-color="#7A5530"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8F0"/>
      <stop offset="100%" stop-color="#F5E6D3"/>
    </linearGradient>
  </defs>
  <!-- Back panel -->
  <rect x="20" y="10" width="760" height="260" rx="8" fill="url(#bg)" stroke="#C49A6C" stroke-width="2"/>
  <!-- Side left -->
  <rect x="20" y="10" width="18" height="260" rx="4" fill="url(#woodDark)"/>
  <!-- Side right -->
  <rect x="762" y="10" width="18" height="260" rx="4" fill="url(#woodDark)"/>
  <!-- Shelf plank 1 -->
  <rect x="20" y="120" width="760" height="16" rx="3" fill="url(#wood)" stroke="#8B6240" stroke-width="1"/>
  <!-- Shelf plank 2 -->
  <rect x="20" y="220" width="760" height="16" rx="3" fill="url(#wood)" stroke="#8B6240" stroke-width="1"/>
  <!-- Wood grain lines -->
  <line x1="100" y1="123" x2="300" y2="123" stroke="#C49A6C" stroke-width="0.5" opacity="0.5"/>
  <line x1="400" y1="126" x2="650" y2="126" stroke="#C49A6C" stroke-width="0.5" opacity="0.5"/>
  <line x1="150" y1="223" x2="400" y2="223" stroke="#C49A6C" stroke-width="0.5" opacity="0.5"/>
  <line x1="500" y1="226" x2="700" y2="226" stroke="#C49A6C" stroke-width="0.5" opacity="0.5"/>
</svg>
