<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 130" width="150" height="130">
  <defs>
    <linearGradient id="basketGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#A67B4B"/>
    </linearGradient>
  </defs>
  <!-- Basket body -->
  <path d="M20,40 L10,120 Q10,128 18,128 L132,128 Q140,128 140,120 L130,40 Z" fill="url(#basketGrad)" stroke="#8B5E3C" stroke-width="2"/>
  <!-- Basket weave lines -->
  <line x1="25" y1="60" x2="125" y2="60" stroke="#8B5E3C" stroke-width="1.5" opacity="0.6"/>
  <line x1="22" y1="80" x2="128" y2="80" stroke="#8B5E3C" stroke-width="1.5" opacity="0.6"/>
  <line x1="18" y1="100" x2="132" y2="100" stroke="#8B5E3C" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="40" x2="42" y2="128" stroke="#8B5E3C" stroke-width="1" opacity="0.4"/>
  <line x1="75" y1="40" x2="75" y2="128" stroke="#8B5E3C" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="40" x2="108" y2="128" stroke="#8B5E3C" stroke-width="1" opacity="0.4"/>
  <!-- Basket rim -->
  <ellipse cx="75" cy="40" rx="56" ry="10" fill="#C4935E" stroke="#8B5E3C" stroke-width="2"/>
  <!-- Handle -->
  <path d="M40,40 Q75,-5 110,40" fill="none" stroke="#8B5E3C" stroke-width="4" stroke-linecap="round"/>
  <!-- Red ribbon -->
  <rect x="60" y="32" width="30" height="8" rx="3" fill="#E74C3C" opacity="0.9"/>
</svg>
